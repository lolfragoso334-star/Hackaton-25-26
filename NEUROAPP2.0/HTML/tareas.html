<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Tareas – NeuroVida</title>
  <link rel="stylesheet" href="../CSS/tareas.css"/>
</head>
<body>

  <!-- ══════════════════════ VISTA: LISTA DE TAREAS ══════════════════════ -->
  <div id="vista-lista">

    <!-- Header -->
    <header class="header-lista">
      <div class="header-inner">
        <div class="header-top">
          <div class="header-top-left">
            <a href="../index.html" class="btn-inicio" aria-label="Volver al inicio">
              🏠 <span>Inicio</span>
            </a>
            <div>
              <p class="header-saludo">Buenos días 👋</p>
              <h1 class="header-titulo">Mis Tareas</h1>
            </div>
          </div>
          <div class="header-badge-completadas">
            <span class="badge-num" id="total-completadas">0</span>
            <span class="badge-label">completadas</span>
          </div>
        </div>

        <!-- Filtros -->
        <div class="filtros" role="group" aria-label="Filtrar tareas">
          <button class="filtro-btn active" data-filtro="todas">Todas</button>
          <button class="filtro-btn" data-filtro="en_progreso">▶ En curso</button>
          <button class="filtro-btn" data-filtro="pendiente">○ Pendientes</button>
          <button class="filtro-btn" data-filtro="completado">✓ Listas</button>
        </div>
      </div>
    </header>

    <!-- Lista -->
    <main class="lista-main">
      <div id="lista-tareas" class="lista-tareas"></div>

      <!-- Estado vacío -->
      <div id="lista-vacia" class="lista-vacia hidden">
        <div class="picto-sm">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#009E73"/>
            <path d="M25 50 L42 67 L75 33" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p class="vacia-titulo">¡Todo listo!</p>
        <p class="vacia-sub">No hay tareas en esta categoría.</p>
      </div>
    </main>

    <footer class="footer-lista">
      <p>¿Necesitas ayuda? Pulsa el botón azul en cada paso 💙</p>
    </footer>
  </div>

  <!-- ══════════════════════ VISTA: DETALLE DE PASOS ══════════════════════ -->
  <div id="vista-detalle" class="hidden">

    <!-- Header detalle -->
    <header class="header-detalle">
      <button id="btn-volver" class="btn-volver" aria-label="Volver a la lista de tareas">
        ← <span>Volver</span>
      </button>
      <div class="detalle-header-info">
        <h1 id="detalle-titulo" class="detalle-titulo"></h1>
        <div class="barra-progreso-wrap">
          <div class="barra-meta">
            <span id="barra-hechos" class="barra-hechos-label"></span>
            <span id="barra-pct" class="barra-pct-label"></span>
          </div>
          <div class="barra-track">
            <div id="barra-fill" class="barra-fill"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- Indicador de pasos (bolitas) -->
    <div id="indicador-pasos" class="indicador-pasos" role="list" aria-label="Pasos de la tarea"></div>

    <!-- Área del paso actual -->
    <main class="detalle-main">
      <div class="paso-wrap">

        <!-- Cabecera del paso -->
        <div class="paso-cabecera">
          <div id="paso-num-circulo" class="paso-num-circulo"></div>
          <div class="paso-meta">
            <p id="paso-de" class="paso-de-label"></p>
            <span id="paso-critico" class="paso-critico hidden">⚠ IMPORTANTE</span>
          </div>
        </div>

        <!-- Pictograma -->
        <div class="picto-card" id="picto-card">
          <div id="picto-area" class="picto-area"></div>
          <p class="picto-hint">Pictograma ARASAAC</p>
        </div>

        <!-- Instrucción -->
        <div class="instruccion-card">
          <p id="instruccion-texto" class="instruccion-texto"></p>
        </div>

        <!-- Mensaje enviado -->
        <div id="msg-enviado" class="msg-enviado hidden">
          <span class="msg-icon">📬</span>
          <p>¡Mensaje enviado! Tu tutor lo verá pronto.</p>
        </div>

        <!-- Botones acción -->
        <div class="acciones-paso">
          <button id="btn-completar" class="btn-completar">
            <div class="picto-xs">
              <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#009E73"/>
                <path d="M25 50 L42 67 L75 33" stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            He terminado este paso
          </button>
          <button id="btn-ayuda" class="btn-ayuda">
            <div class="picto-xs">
              <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#0072B2"/>
                <text x="50" y="68" text-anchor="middle" font-size="52" font-weight="bold" fill="white" font-family="Georgia">?</text>
              </svg>
            </div>
            Necesito ayuda
          </button>
        </div>

        <!-- Navegación pasos -->
        <div class="nav-pasos">
          <button id="btn-anterior" class="btn-nav" disabled>← Paso anterior</button>
          <button id="btn-siguiente" class="btn-nav">Paso siguiente →</button>
        </div>

      </div>
    </main>
  </div>

  <!-- ══════════════════════ MODAL AYUDA ══════════════════════ -->
  <div id="modal-ayuda" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div class="modal">
      <div class="modal-header">
        <div class="picto-sm">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="#0072B2"/>
            <text x="50" y="68" text-anchor="middle" font-size="52" font-weight="bold" fill="white" font-family="Georgia">?</text>
          </svg>
        </div>
        <div>
          <h2 id="modal-titulo" class="modal-titulo">Necesito ayuda</h2>
          <p id="modal-subtitulo" class="modal-subtitulo"></p>
        </div>
      </div>
      <p class="modal-label">¿Qué necesitas? Escríbelo aquí:</p>
      <textarea
        id="modal-textarea"
        class="modal-textarea"
        rows="4"
        placeholder="Ejemplo: No encuentro la caja del servidor..."
      ></textarea>
      <div class="modal-footer">
        <button id="modal-cancelar" class="modal-btn-cancelar">Cancelar</button>
        <button id="modal-enviar" class="modal-btn-enviar" disabled>📤 Enviar ayuda</button>
      </div>
    </div>
  </div>

  <script src="../JS/tareas.js"></script>
</body>
</html>
