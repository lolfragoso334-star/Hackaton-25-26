<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroVida – Acceder</title>
  <link rel="stylesheet" href="CSS/login.css"/>
</head>
<body>

  <div class="login-wrap">

    <!-- Logo -->
    <div class="login-logo">
      <div class="logo-icon" aria-hidden="true">🧠</div>
      <h1 class="login-brand">Neuro<span>Vida</span></h1>
    </div>

    <p class="login-subtitulo">Tu espacio seguro de trabajo</p>

    <!-- Tarjeta del formulario -->
    <div class="login-card">
      <h2 class="login-card-titulo">Iniciar sesión</h2>

      <!-- Error -->
      <div id="login-error" class="login-error hidden" role="alert">
        <span>⚠</span> <span id="login-error-msg">Usuario o contraseña incorrectos.</span>
      </div>

      <!-- Campo usuario -->
      <div class="form-field">
        <label class="form-label" for="campo-usuario">Usuario</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            id="campo-usuario"
            class="form-input"
            type="text"
            placeholder="tu.usuario"
            autocomplete="username"
            autocapitalize="none"
            required
          />
        </div>
      </div>

      <!-- Campo contraseña -->
      <div class="form-field">
        <label class="form-label" for="campo-password">Contraseña</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="campo-password"
            class="form-input"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="btn-ver-pass" id="btn-ver-pass" aria-label="Mostrar contraseña">
            <svg id="icon-ojo-abierto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-ojo-cerrado" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Botón acceder -->
      <button id="btn-login" class="btn-login">
        <span id="btn-login-texto">Entrar</span>
        <span id="btn-login-spinner" class="spinner hidden" aria-hidden="true"></span>
      </button>

    </div>



    <p class="login-footer">© 2026 NeuroVida S.L.</p>

  </div>

  <script src="JS/supabase.js"></script>
  <script src="JS/auth.js"></script>
  <script>
// Enter en cualquier campo dispara login
    ["campo-usuario","campo-password"].forEach(id => {
      document.getElementById(id).addEventListener("keydown", e => {
        if (e.key === "Enter") document.getElementById("btn-login").click();
      });
    });

    // Mostrar / ocultar contraseña
    document.getElementById("btn-ver-pass").addEventListener("click", () => {
      const input = document.getElementById("campo-password");
      const abierto = document.getElementById("icon-ojo-abierto");
      const cerrado = document.getElementById("icon-ojo-cerrado");
      if (input.type === "password") {
        input.type = "text";
        abierto.classList.add("hidden");
        cerrado.classList.remove("hidden");
      } else {
        input.type = "password";
        abierto.classList.remove("hidden");
        cerrado.classList.add("hidden");
      }
    });
  </script>
</body>
</html>
