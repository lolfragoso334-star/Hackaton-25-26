<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda – NeuroVida</title>  <link rel="stylesheet" href="../CSS/neurovida.css" />
  <link rel="stylesheet" href="../CSS/header.css" />
  <link rel="stylesheet" href="../CSS/agenda.css" />
  <link rel="stylesheet" href="../CSS/ajustes.css" />
</head>

<body>

  <!-- ════════════════════════ HEADER UNIFICADO ════════════════════════ -->
  <header class="header-main" role="banner">
    <a class="header-logo" href="../index.html" aria-label="NeuroVida – Inicio">
      <div class="header-logo-icon" aria-hidden="true">🧠</div>
      <h1>Neuro<span>Vida</span></h1>
    </a>

    <nav class="header-nav" aria-label="Navegación principal">
      <a class="nav-btn btn-tareas" href="../index.html">
        <span class="nav-icon">✅</span> Tareas
      </a>
      <a class="nav-btn btn-agenda active" href="agenda.html" aria-current="page">
        <span class="nav-icon">📅</span> Agenda
      </a>
      <a class="nav-btn btn-mensajes" href="mensajes.html">
        <span class="nav-icon">💬</span> Mensajes
      </a>
    </nav>

    <div class="header-acciones">
      <div class="header-stats">
        <div class="stat-pill"><span id="stat-proximas" class="stat-num">0</span><span class="stat-label">próximas</span></div>
        <div class="stat-pill stat-pill--green"><span id="stat-hoy" class="stat-num">0</span><span class="stat-label">hoy</span></div>
      </div>
      <button id="btn-nueva-cita" class="header-icon-btn hidden" aria-label="Nueva cita" style="font-size:1rem;padding:0 18px;">+ Nueva</button>
      <button class="header-icon-btn" onclick="abrirAjustes()" aria-label="Ajustes" title="Ajustes">⚙️</button>
      <button class="header-icon-btn header-user-btn" aria-label="Perfil de usuario">
        👤 <span class="user-greeting">…</span>
      </button>
    </div>
  </header>

  <!-- ════════════════════════ LAYOUT ════════════════════════ -->
  <div class="agenda-layout">

    <!-- ── COLUMNA IZQUIERDA: calendario mensual ── -->
    <aside class="panel-cal">
      <div class="cal-mini-header">
        <button id="cal-prev" class="cal-nav-btn" aria-label="Mes anterior">‹</button>
        <h2 id="cal-mini-label" class="cal-mini-label"></h2>
        <button id="cal-next" class="cal-nav-btn" aria-label="Mes siguiente">›</button>
      </div>
      <div id="cal-mini-grid" class="cal-mini-grid" role="grid" aria-label="Calendario mini"></div>

    </aside>

    <!-- ── COLUMNA DERECHA: lista de citas del día/mes ── -->
    <main class="panel-citas">

      <!-- Filtros de vista -->
      <div class="vista-tabs" role="tablist" aria-label="Filtro de citas">
        <button class="vista-tab active" data-vista="proximas" role="tab" aria-selected="true">📅 Próximas</button>
        <button class="vista-tab" data-vista="hoy" role="tab" aria-selected="false">☀️ Hoy</button>
        <button class="vista-tab" data-vista="todas" role="tab" aria-selected="false">📋 Todas</button>
        <button class="vista-tab" data-vista="pasadas" role="tab" aria-selected="false">✓ Pasadas</button>
      </div>

      <!-- Lista de citas -->
      <div id="lista-citas" class="lista-citas"></div>

      <!-- Estado vacío -->
      <div id="citas-vacias" class="citas-vacias hidden">
        <div class="vacia-icon">📭</div>
        <p class="vacia-titulo">Sin citas en esta vista</p>
        <p class="vacia-sub" id="vacia-sub-texto">No tienes citas próximas.</p>
      </div>

    </main>
  </div>

  <!-- ════════════════════ MODAL NUEVA/EDITAR CITA ════════════════════ -->
  <div id="modal-cita" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-cita-titulo">
    <div class="modal-cita">

      <div class="modal-cita-header">
        <h2 id="modal-cita-titulo" class="modal-cita-h2">Nueva cita</h2>
        <button id="modal-cita-cerrar" class="modal-cerrar-btn" aria-label="Cerrar">✕</button>
      </div>

      <form id="form-cita" novalidate>

        <!-- Título -->
        <div class="form-field">
          <label class="form-label" for="cita-titulo">Título <span class="req">*</span></label>
          <input id="cita-titulo" class="form-input" type="text" placeholder="Ej: Sesión de seguimiento semanal" maxlength="80" required />
        </div>

        <!-- Tipo -->
        <div class="form-field">
          <label class="form-label" for="cita-tipo">Tipo de cita</label>
          <select id="cita-tipo" class="form-select">
            <option value="seguimiento">📊 Seguimiento</option>
            <option value="orientacion">🧭 Orientación laboral</option>
            <option value="empresa">🏢 Con empresa</option>
            <option value="familia">👨‍👩‍👧 Con familia</option>
            <option value="medica">🏥 Médica</option>
            <option value="otro">📌 Otro</option>
          </select>
        </div>

        <!-- Fecha y hora -->
        <div class="form-row">
          <div class="form-field">
            <label class="form-label" for="cita-fecha">Fecha <span class="req">*</span></label>
            <input id="cita-fecha" class="form-input" type="date" required />
          </div>
          <div class="form-field">
            <label class="form-label" for="cita-hora">Hora <span class="req">*</span></label>
            <input id="cita-hora" class="form-input" type="time" required />
          </div>
          <div class="form-field">
            <label class="form-label" for="cita-duracion">Duración</label>
            <select id="cita-duracion" class="form-select">
              <option value="30">30 min</option>
              <option value="45">45 min</option>
              <option value="60" selected>1 hora</option>
              <option value="90">1h 30 min</option>
              <option value="120">2 horas</option>
            </select>
          </div>
        </div>

        <!-- Trabajador asignado (solo admin) -->
        <div class="form-field" id="campo-trabajador-wrap">
          <label class="form-label" for="cita-trabajador">Trabajador</label>
          <select id="cita-trabajador" class="form-select">
            <option value="">— Sin asignar —</option>
          </select>
        </div>

        <!-- Lugar -->
        <div class="form-field">
          <label class="form-label" for="cita-lugar">Lugar / modalidad</label>
          <select id="cita-lugar" class="form-select">
            <option value="presencial">📍 Presencial – Sede</option>
            <option value="empresa">🏢 En la empresa</option>
            <option value="videollamada">💻 Videollamada</option>
            <option value="telefono">📞 Teléfono</option>
          </select>
        </div>

        <!-- Notas -->
        <div class="form-field">
          <label class="form-label" for="cita-notas">Notas previas</label>
          <textarea id="cita-notas" class="form-textarea" rows="3" placeholder="Temas a tratar, preparación necesaria..."></textarea>
        </div>

        <!-- Recordatorio -->
        <div class="form-field form-field-check">
          <label class="check-label">
            <input type="checkbox" id="cita-recordatorio" checked />
            <span class="check-custom"></span>
            Mostrar recordatorio el día anterior
          </label>
        </div>

        <div class="form-actions">
          <button type="button" id="btn-cancelar-cita" class="btn-cancelar">Cancelar</button>
          <button type="submit" id="btn-guardar-cita" class="btn-guardar">💾 Guardar cita</button>
        </div>

      </form>
    </div>
  </div>

  <!-- ════════════════════ MODAL DETALLE CITA ════════════════════ -->
  <div id="modal-detalle" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="detalle-titulo">
    <div class="modal-detalle">

      <div class="modal-cita-header">
        <h2 id="detalle-titulo" class="modal-cita-h2">Detalle de cita</h2>
        <button id="detalle-cerrar" class="modal-cerrar-btn" aria-label="Cerrar">✕</button>
      </div>

      <div id="detalle-body" class="detalle-body"></div>

      <div class="detalle-actions">
        <button id="detalle-btn-completar" class="btn-completar-cita">✓ Marcar como realizada</button>
        <button id="detalle-btn-editar" class="btn-editar-cita hidden">✏️ Editar</button>
        <button id="detalle-btn-borrar" class="btn-borrar-cita hidden">🗑️ Borrar</button>
      </div>

    </div>
  </div>

  <!-- ════════════════════ MODAL CONFIRMAR BORRADO ════════════════════ -->
  <div id="modal-borrar" class="modal-overlay hidden" role="dialog" aria-modal="true">
    <div class="modal-confirm">
      <p class="modal-confirm-icon">🗑️</p>
      <h3 class="modal-confirm-titulo">¿Borrar esta cita?</h3>
      <p class="modal-confirm-sub">Esta acción no se puede deshacer.</p>
      <div class="modal-confirm-actions">
        <button id="modal-borrar-cancelar" class="btn-cancelar">Cancelar</button>
        <button id="modal-borrar-confirmar" class="btn-borrar-confirm">Sí, borrar</button>
      </div>
    </div>
  </div>

  <!-- ════════════════════ TOAST ════════════════════ -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="../JS/supabase.js"></script>
  <script src="../JS/auth.js"></script>
  <script src="../JS/ajustes.js"></script>
  <script>
  const _session = requireAuth();
  document.addEventListener("DOMContentLoaded", () => {
    const el = document.querySelector(".user-greeting");
    if (el && _session) el.textContent = _session.nombre.split(" ")[0];

    // Adaptar nav para especialista
    if (_session && _session.rol === 'especialista') {
      // Logo
      // Nav "Tareas" -> "Pacientes"
      const btnTareas = document.querySelector('.nav-btn.btn-tareas');
      if (btnTareas) {
        btnTareas.href = 'especialista.html';
        btnTareas.innerHTML = '<span class="nav-icon">🩺</span> Pacientes';
      }
      // Cambiar icono 👤 -> 🩺 en el botón de usuario
      const userBtn = document.querySelector('.header-user-btn');
      if (userBtn) {
        const greeting = userBtn.querySelector('.user-greeting');
        userBtn.textContent = '';
        userBtn.appendChild(document.createTextNode('🩺 '));
        if (greeting) userBtn.appendChild(greeting);
      }
    }
      if (_session.rol === 'admin') {
        const userBtn = document.querySelector('.header-user-btn');
        if (userBtn) {
          const greetingEl = userBtn.querySelector('.user-greeting');
          userBtn.textContent = '';
          userBtn.appendChild(document.createTextNode('🛡️ '));
          if (greetingEl) userBtn.appendChild(greetingEl);
        }
      }
  });
</script>
  <script src="../JS/agenda.js"></script>

</body>
</html>
